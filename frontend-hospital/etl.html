<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HospitalDB - Carga de Datos ETL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Zona de arrastre para subir archivos */
        .dropzone {
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f9fafb;
        }

        .dropzone:hover,
        .dropzone.drag-over {
            border-color: #1e3a6e;
            background: #eff6ff;
        }

        .dropzone.con-archivo {
            border-color: #1e3a6e;
            background: #eff6ff;
            border-style: solid;
        }

        /* Fila de mapeo de campos */
        .map-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .map-origen {
            font-family: monospace;
            font-size: 12px;
            color: #6b7280;
            flex: 1;
        }

        .map-destino {
            font-family: monospace;
            font-size: 12px;
            color: #1e3a6e;
            font-weight: 600;
            flex: 1;
        }

        .map-trans {
            font-size: 11px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            color: #374151;
            padding: 2px 7px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="app-wrapper">

        <nav id="topnav" class="topnav"></nav>

        <div class="body-wrap">
            <aside id="sidebar" class="sidebar"></aside>

            <main class="content">

                <div class="page-header">
                    <div>
                        <h1>Carga Masiva de Datos - ETL</h1>
                        <p>Importación masiva de registros clínicos y sincronización de inventario.</p>
                    </div>
                    <div class="page-header-btns">

                        <button class="btn-secondary" onclick="generarRespaldo()">Crear Respaldo de Pacientes</button>
                        <button id="btn-procesar" class="btn-primary" onclick="iniciarProcesamientoETL()">
                            <i class="ti ti-player-play"></i>Iniciar Procesamiento
                        </button>
                    </div>
                </div>

                <div
                    style="display: grid; grid-template-columns: minmax(300px, 400px) 1fr; gap: 20px; margin-bottom: 20px; align-items: start;">

                    <div class="card" style="padding:18px">
                        <p style="font-size:14px;font-weight:600;color:#111827;margin-bottom:14px">Origen del Archivo
                        </p>

                        <div class="dropzone" id="dropzone">
                            <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none">
                            <div id="dropzone-content">
                                <i class="ti ti-cloud-upload"
                                    style="font-size:32px;color:#9ca3af;display:block;margin-bottom:8px"></i>
                                <p style="font-size:13px;font-weight:500;color:#6b7280">Arrastrar archivo CSV o XLSX</p>
                                <p class="text-sm text-muted" style="margin-top:4px">O haga clic para navegar</p>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top:14px;margin-bottom:10px">
                            <label class="form-label">Codificación de caracteres</label>
                            <select class="form-input">
                                <option>UTF-8 (Recomendado)</option>
                                <option>Latin-1</option>
                            </select>
                        </div>

                        <p class="form-label" style="margin-top: 15px;">Destino de Datos</p>
                        <label
                            style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;cursor:pointer">
                            <input type="radio" name="destino" value="inventario" checked> Inventario Central
                        </label>
                        <label
                            style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;cursor:pointer">
                            <input type="radio" name="destino" value="pacientes"> Registros de Pacientes
                        </label>
                    </div>

                    <div class="card">
                        <div class="card-header" style="padding: 18px; border-bottom: 1px solid #e5e7eb;">
                            <h3 style="font-size:14px;font-weight:600;color:#111827;">Historial de Cargas (Auditoría)
                            </h3>
                        </div>
                        <div class="table-wrap">
                            <table style="width: 100%; text-align: left;">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Archivo</th>
                                        <th>Destino</th>
                                        <th>Total</th>
                                        <th>Exitosos</th>
                                        <th>Errores</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script>
        Auth.requireLogin()
        renderLayout('etl.html');
        // 1. Variables de la UI
        const dropZone = document.getElementById('dropzone'); // El recuadro punteado
        const fileInput = document.getElementById('file-input'); // El input file oculto
        let archivoSeleccionado = null;

        // 2. Manejo del Drag & Drop (Arrastrar y Soltar)
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#1e3a6e';
            dropZone.style.backgroundColor = '#f3f4f6';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.backgroundColor = 'transparent';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.backgroundColor = 'transparent';

            if (e.dataTransfer.files.length > 0) {
                archivoSeleccionado = e.dataTransfer.files[0];
                actualizarUIArchivo(archivoSeleccionado.name);
            }
        });

        // Por si hacen clic en lugar de arrastrar
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                archivoSeleccionado = e.target.files[0];
                actualizarUIArchivo(archivoSeleccionado.name);
            }
        });

        function actualizarUIArchivo(nombre) {
            // Actualiza el texto del recuadro para que el usuario sepa que se cargó
            dropZone.innerHTML = `<i class="ti ti-file-check" style="font-size: 32px; color: #10b981;"></i>
                          <p style="margin-top: 10px; font-weight: 500;">${nombre}</p>
                          <span style="font-size: 12px; color: #6b7280;">Listo para procesar</span>`;
        }

        // 3. Función principal que llama a FastAPI
        async function iniciarProcesamientoETL() {
            console.log("1. Botón presionado. Verificando archivo...");
            if (!archivoSeleccionado) {
                alert('Por favor, selecciona o arrastra un archivo primero.');
                return;
            }

            console.log("2. Archivo detectado:", archivoSeleccionado.name);

            // ¡ESTA ES LA LÍNEA CRÍTICA QUE FALTABA!
            const destinoSeleccionado = document.querySelector('input[name="destino"]:checked');

            if (!destinoSeleccionado) {
                alert('Por favor, selecciona un Destino de Datos.');
                return;
            }

            let destinoTexto = "";
            if (destinoSeleccionado.value === "pacientes") destinoTexto = "Registros de Pacientes";
            else if (destinoSeleccionado.value === "inventario") destinoTexto = "Inventario Central";
            else destinoTexto = "Farmacia Clinica";

            console.log("3. Destino configurado:", destinoTexto);

            const formData = new FormData();
            formData.append('file', archivoSeleccionado);
            formData.append('destino', destinoTexto);

            const btnProcesar = document.getElementById('btn-procesar');
            const textoOriginal = btnProcesar.innerHTML;
            btnProcesar.innerHTML = '<span class="spinner spinner-light"></span> Procesando...';
            btnProcesar.disabled = true;

            try {
                console.log("4. Enviando a FastAPI...");
                const response = await fetch('http://127.0.0.1:8000/api/etl/procesar', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                console.log("5. Respuesta del servidor:", data);

                if (response.ok && !data.error) {
                    alert(`Carga exitosa: ${data.exitosos} registros insertados.`);
                    cargarHistorialETL();
                    // Limpiamos el dropzone
                    archivoSeleccionado = null;
                    document.getElementById('dropzone').innerHTML = `<i class="ti ti-cloud-upload" style="font-size: 32px; color: #9ca3af;"></i><p style="margin-top: 10px;">Arrastrar archivos CSV o XLSX</p>`;
                } else {
                    alert("Error del servidor: " + (data.error || data.detail));
                }
            } catch (error) {
                console.error("6. Error crítico en la conexión:", error);
                alert('Error de conexión con el servidor.');
            } finally {
                btnProcesar.innerHTML = textoOriginal;
                btnProcesar.disabled = false;
            }
        }


        // --- NUEVA FUNCIÓN PARA EL HISTORIAL ---
        async function cargarHistorialETL() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/etl/historial');
                if (!response.ok) throw new Error('Error de red al obtener historial');

                const historial = await response.json();

                // Buscamos el cuerpo de tu tabla (asegúrate de que tu tabla en HTML tenga un <tbody>)
                const tbody = document.querySelector('table tbody');
                tbody.innerHTML = ''; // Limpiamos la tabla

                historial.forEach(item => {
                    const badgeClass = item.estado === 'Completado' ? 'badge' : 'badge badge-error';

                    // Reconstruimos las filas dinámicamente
                    const fila = `
                <tr>
                    <td class="font-mono text-sm text-muted">${item.fecha}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:7px">
                            <i class="ti ti-file-spreadsheet" style="color:#374151"></i>
                            ${item.archivo}
                        </div>
                    </td>
                    <td style="font-weight: 500; color: #1e3a6e;">${item.destino}</td>
                    <td class="font-mono">${item.total}</td>
                    <td class="font-mono" style="color: #10b981;">${item.exitosos}</td>
                    <td class="font-mono" style="color: #ef4444;">${item.errores}</td>
                    <td><span class="${badgeClass}">${item.estado}</span></td>
                </tr>
            `;
                    tbody.innerHTML += fila;
                });
            } catch (error) {
                console.error("Error cargando historial:", error);
            }
        }

        // Hacemos que se cargue automáticamente al abrir la página
        document.addEventListener('DOMContentLoaded', cargarHistorialETL);



        async function generarRespaldo() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/etl/respaldo-pacientes', {
                    method: 'POST'
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`¡Éxito! Se creó el respaldo con ${data.total_registros} pacientes.`);
                } else {
                    alert(`Error: ${data.detail}`);
                }
            } catch (error) {
                console.error("Error al generar respaldo:", error);
            }
        }


    </script>

</body>

</html>
