<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HospitalDB - Prescripciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-wrapper">

    <nav id="topnav" class="topnav"></nav>

    <div class="body-wrap">
        <aside id="sidebar" class="sidebar"></aside>

        <main class="content">

            <div class="page-header">
                <div>
                    <h1>Prescripciones y Diagnosticos</h1>
                    <p>Gestion clinica de medicamentos y diagnosticos.</p>
                </div>
                <div class="page-header-btns">
                    <button class="btn-secondary" onclick="openModal('modal-diagnostico')">
                        <i class="ti ti-stethoscope"></i>Nuevo Diagnostico
                    </button>
                    <button class="btn-primary" onclick="abrirModalPrescripcion()">
                        <i class="ti ti-plus"></i>Prescribir Medicamento
                    </button>
                </div>
            </div>

            <!-- Tabla de inventario con datos reales -->
            <div class="card">
                <div class="card-header" style="background:#1e3a6e">
                    <h3 style="color:#fff">Control de Inventario - Medicamentos</h3>
                    <button class="btn-secondary"
                        style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;font-size:12px"
                        onclick="loadInventario()">
                        <i class="ti ti-refresh"></i>Actualizar
                    </button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre Generico</th>
                                <th>Nombre Comercial</th>
                                <th>Presentacion</th>
                                <th>Stock Actual</th>
                                <th>Stock Minimo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-inventario">
                            <tr>
                                <td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">
                                    <span class="spinner spinner-dark"></span> Cargando...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Modal registrar diagnostico -->
<div id="modal-diagnostico" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h2>Registrar Diagnostico</h2>
            <button class="modal-close" onclick="closeModal('modal-diagnostico')">x</button>
        </div>
        <div class="modal-body">
            <div id="diag-alert" class="hidden"></div>

            <!-- Seleccionar cita primero -->
            <div class="form-group">
                <label class="form-label">Cita Medica *</label>
                <select id="d-cita" class="form-input" required onchange="cargarMedicoDeCita()">
                    <option value="">Seleccionar cita...</option>
                </select>
            </div>

            <!-- Medico se carga automaticamente al seleccionar la cita -->
            <div class="form-group">
                <label class="form-label">Medico Tratante</label>
                <input id="d-medico-nombre" class="form-input" readonly
                       style="background:#f9fafb;color:#6b7280"
                       placeholder="Se carga al seleccionar la cita">
                <input type="hidden" id="d-medico-id">
            </div>

            <div class="form-group">
                <label class="form-label">Codigo CIE-10 *</label>
                <input id="d-cie" class="form-input font-mono"
                       placeholder="Ej. J06.9" required>
            </div>

            <div class="form-group">
                <label class="form-label">Fecha del Diagnostico</label>
                <input id="d-fecha" type="date" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Descripcion *</label>
                <textarea id="d-desc" class="form-input" required
                          placeholder="Descripcion clinica del diagnostico"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('modal-diagnostico')">Cancelar</button>
            <button id="btn-diag" class="btn-primary" onclick="guardarDiagnostico()">
                <i class="ti ti-circle-check"></i>Registrar
            </button>
        </div>
    </div>
</div>

<!-- Modal prescribir medicamento -->
<!-- Flujo: seleccionar cita -> cargar diagnosticos -> seleccionar diagnostico -> prescribir -->
<div id="modal-prescripcion" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h2>Prescribir Medicamento</h2>
            <button class="modal-close" onclick="closeModal('modal-prescripcion')">x</button>
        </div>
        <div class="modal-body">
            <div id="presc-alert" class="hidden"></div>

            <div class="form-group">
                <label class="form-label">Paso 1 — Seleccionar Cita *</label>
                <select id="p-cita" class="form-input" required onchange="cargarDiagnosticos()">
                    <option value="">Seleccionar cita...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Paso 2 — Seleccionar Diagnostico *</label>
                <select id="p-diagnostico" class="form-input" required>
                    <option value="">Primero seleccione una cita</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Medico Tratante</label>
                <input id="p-medico-nombre" class="form-input" readonly
                       style="background:#f9fafb;color:#6b7280"
                       placeholder="Se carga automaticamente">
                <input type="hidden" id="p-medico-id">
            </div>

            <div class="form-group">
                <label class="form-label">Paso 3 — Medicamento *</label>
                <select id="p-medicamento" class="form-input" required onchange="mostrarStockMed()">
                    <option value="">Seleccionar medicamento...</option>
                </select>
            </div>

            <!-- Info de stock al seleccionar medicamento -->
            <div id="info-stock" class="hidden" style="margin-bottom:14px">
                <div class="alert alert-info" id="alerta-stock"></div>
            </div>

            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Dosis *</label>
                    <input id="p-dosis" class="form-input" placeholder="Ej. 500mg" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Frecuencia *</label>
                    <input id="p-frec" class="form-input" placeholder="Ej. Cada 8 horas" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Duracion en dias *</label>
                    <input id="p-dias" type="number" class="form-input" required min="1">
                </div>
                <div class="form-group">
                    <label class="form-label">Cantidad a dispensar *</label>
                    <input id="p-cantidad" type="number" class="form-input" required min="1">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('modal-prescripcion')">Cancelar</button>
            <button id="btn-presc" class="btn-primary" onclick="guardarPrescripcion()">
                <i class="ti ti-pill"></i>Prescribir
            </button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
    Auth.requireLogin();
    renderLayout('prescripciones.html');

    var inventarioData = [];
    var citasData      = [];

    // Carga el inventario de medicamentos desde el backend
    async function loadInventario() {
        var tbody = document.getElementById('tabla-inventario');
        tbody.innerHTML =
            '<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">' +
            '<span class="spinner spinner-dark"></span> Cargando...</td></tr>';

        try {
            inventarioData = await API.getInventario() || [];

            if (inventarioData.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">' +
                    'No hay medicamentos en inventario.</td></tr>';
                return;
            }

            tbody.innerHTML = inventarioData.map(function(item) {
                var estadoTexto;
                if (item.stock_actual === 0) {
                    estadoTexto = 'Sin Stock';
                } else if (item.stock_actual <= item.stock_minimo) {
                    estadoTexto = 'Stock Bajo';
                } else {
                    estadoTexto = 'Disponible';
                }

                return '<tr>' +
                    '<td class="font-mono text-muted text-sm">#' + item.id_medicamento + '</td>' +
                    '<td style="font-weight:600;color:#111827">' + (item.nombre_generico || '-') + '</td>' +
                    '<td class="text-muted">' + (item.nombre_comercial || '-') + '</td>' +
                    '<td class="text-muted">' + (item.presentacion || '-') + '</td>' +
                    '<td class="font-mono" style="font-weight:700">' + item.stock_actual + '</td>' +
                    '<td class="font-mono text-muted">' + item.stock_minimo + '</td>' +
                    '<td><span class="badge">' + estadoTexto + '</span></td>' +
                '</tr>';
            }).join('');

            // Llenar dropdown de medicamentos en el modal de prescripcion
            var selectMed = document.getElementById('p-medicamento');
            selectMed.innerHTML = '<option value="">Seleccionar medicamento...</option>';
            inventarioData.forEach(function(item) {
                var opt = document.createElement('option');
                opt.value = item.id_medicamento;
                opt.textContent = item.nombre_generico + ' - ' +
                    item.nombre_comercial + ' (' + item.presentacion + ')';
                opt.dataset.stock  = item.stock_actual;
                opt.dataset.minimo = item.stock_minimo;
                selectMed.appendChild(opt);
            });

        } catch (err) {
            tbody.innerHTML =
                '<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">' +
                'Error al cargar inventario.</td></tr>';
        }
    }

    // Carga las citas para los dropdowns de ambos modales
    async function loadCitasParaDropdowns() {
        try {
            citasData = await API.getCitas() || [];

            // Llenar dropdown de citas en modal de diagnostico
            var selDiagCita = document.getElementById('d-cita');
            selDiagCita.innerHTML = '<option value="">Seleccionar cita...</option>';

            // Llenar dropdown de citas en modal de prescripcion
            var selPrescCita = document.getElementById('p-cita');
            selPrescCita.innerHTML = '<option value="">Seleccionar cita...</option>';

            citasData.forEach(function(c) {
                var texto = '#' + c.id_cita + ' — ' +
                    (c.nombre_paciente || 'Paciente #' + c.PACIENTE_id_paciente) +
                    ' — ' + formatDate(c.fecha_hora) +
                    ' (' + (c.estado || 'Pendiente') + ')';

                var opt1 = document.createElement('option');
                opt1.value = c.id_cita;
                opt1.dataset.medicoId     = c.MEDICO_id_medico || '';
                opt1.dataset.medicoNombre = c.nombre_medico || ('Medico #' + c.MEDICO_id_medico);
                opt1.textContent = texto;
                selDiagCita.appendChild(opt1);

                var opt2 = document.createElement('option');
                opt2.value = c.id_cita;
                opt2.dataset.medicoId     = c.MEDICO_id_medico || '';
                opt2.dataset.medicoNombre = c.nombre_medico || ('Medico #' + c.MEDICO_id_medico);
                opt2.textContent = texto;
                selPrescCita.appendChild(opt2);
            });

        } catch (err) {}
    }

    // Al seleccionar cita en modal de diagnostico, cargar el medico automaticamente
    function cargarMedicoDeCita() {
        var select = document.getElementById('d-cita');
        var opt    = select.options[select.selectedIndex];
        if (opt && opt.dataset.medicoId) {
            document.getElementById('d-medico-nombre').value = opt.dataset.medicoNombre;
            document.getElementById('d-medico-id').value     = opt.dataset.medicoId;
        } else {
            document.getElementById('d-medico-nombre').value = '';
            document.getElementById('d-medico-id').value     = '';
        }
    }

    // Al seleccionar cita en modal de prescripcion, cargar diagnosticos de esa cita
    async function cargarDiagnosticos() {
        var select  = document.getElementById('p-cita');
        var opt     = select.options[select.selectedIndex];
        var idCita  = select.value;

        // Limpiar y resetear
        document.getElementById('p-diagnostico').innerHTML =
            '<option value="">Cargando diagnosticos...</option>';
        document.getElementById('p-medico-nombre').value = '';
        document.getElementById('p-medico-id').value     = '';

        if (!idCita) {
            document.getElementById('p-diagnostico').innerHTML =
                '<option value="">Primero seleccione una cita</option>';
            return;
        }

        // Cargar medico de la cita seleccionada
        if (opt && opt.dataset.medicoId) {
            document.getElementById('p-medico-nombre').value = opt.dataset.medicoNombre;
            document.getElementById('p-medico-id').value     = opt.dataset.medicoId;
        }

        try {
            var diags = await API.getDiagnosticosPorCita(idCita) || [];
            var selDiag = document.getElementById('p-diagnostico');

            if (diags.length === 0) {
                selDiag.innerHTML =
                    '<option value="">Sin diagnosticos para esta cita. Registra uno primero.</option>';
                return;
            }

            selDiag.innerHTML = '<option value="">Seleccionar diagnostico...</option>';
            diags.forEach(function(d) {
                var opt = document.createElement('option');
                opt.value = d.id_diagnostico;
                opt.textContent = (d.codigo_cie10 || 'Sin codigo') + ' — ' + d.descripcion;
                selDiag.appendChild(opt);
            });

        } catch (err) {
            document.getElementById('p-diagnostico').innerHTML =
                '<option value="">Error al cargar diagnosticos</option>';
        }
    }

    // Muestra informacion del stock al seleccionar un medicamento
    function mostrarStockMed() {
        var select  = document.getElementById('p-medicamento');
        var opt     = select.options[select.selectedIndex];
        var infoEl  = document.getElementById('info-stock');
        var alertEl = document.getElementById('alerta-stock');

        if (!opt || !opt.dataset.stock) {
            infoEl.classList.add('hidden');
            return;
        }

        var stock  = parseInt(opt.dataset.stock);
        var minimo = parseInt(opt.dataset.minimo);
        infoEl.classList.remove('hidden');
        alertEl.className = 'alert ' + (stock <= minimo ? 'alert-warning' : 'alert-info');
        alertEl.innerHTML =
            '<i class="ti ti-package"></i>' +
            '<span>Stock disponible: <strong>' + stock + ' unidades</strong>' +
            ' &nbsp;|&nbsp; Stock minimo: ' + minimo + ' unidades</span>';
    }

    // Abre el modal de prescripcion y resetea los campos
    function abrirModalPrescripcion() {
        document.getElementById('p-cita').value           = '';
        document.getElementById('p-diagnostico').innerHTML=
            '<option value="">Primero seleccione una cita</option>';
        document.getElementById('p-medico-nombre').value  = '';
        document.getElementById('p-medico-id').value      = '';
        document.getElementById('p-medicamento').value    = '';
        document.getElementById('p-dosis').value          = '';
        document.getElementById('p-frec').value           = '';
        document.getElementById('p-dias').value           = '';
        document.getElementById('p-cantidad').value       = '';
        document.getElementById('info-stock').classList.add('hidden');
        hideAlert('presc-alert');
        openModal('modal-prescripcion');
    }

    // Guarda el diagnostico en el backend
    async function guardarDiagnostico() {
        hideAlert('diag-alert');

        var idCita   = document.getElementById('d-cita').value;
        var idMedico = document.getElementById('d-medico-id').value;
        var cie      = document.getElementById('d-cie').value.trim();
        var desc     = document.getElementById('d-desc').value.trim();
        var fecha    = document.getElementById('d-fecha').value;

        if (!idCita || !cie || !desc) {
            showAlert('diag-alert', 'Cita, codigo CIE-10 y descripcion son obligatorios.', 'error');
            return;
        }

        if (!idMedico) {
            showAlert('diag-alert', 'No se pudo determinar el medico. Verifica la cita seleccionada.', 'error');
            return;
        }

        var data = {
            codigo_cie10: cie,
            descripcion:  desc,
            id_cita:      parseInt(idCita),
            id_medico:    parseInt(idMedico)
        };
        if (fecha) data.fecha_diagnostico = fecha;

        setLoading('btn-diag', true);
        try {
            await API.crearDiagnostico(data);
            closeModal('modal-diagnostico');
            showAlert('diag-alert', 'Diagnostico registrado correctamente.', 'success');
        } catch (err) {
            showAlert('diag-alert', err.message, 'error');
        } finally {
            setLoading('btn-diag', false);
        }
    }

    // Guarda la prescripcion en el backend y descuenta el stock
    async function guardarPrescripcion() {
        hideAlert('presc-alert');

        var idDiag   = document.getElementById('p-diagnostico').value;
        var idMedico = document.getElementById('p-medico-id').value;
        var idMed    = document.getElementById('p-medicamento').value;
        var dosis    = document.getElementById('p-dosis').value.trim();
        var frec     = document.getElementById('p-frec').value.trim();
        var dias     = document.getElementById('p-dias').value;
        var cant     = document.getElementById('p-cantidad').value;

        if (!idDiag || !idMed || !dosis || !frec || !dias || !cant) {
            showAlert('presc-alert', 'Todos los campos son obligatorios.', 'error');
            return;
        }

        if (!idMedico) {
            showAlert('presc-alert', 'No se pudo determinar el medico. Selecciona la cita nuevamente.', 'error');
            return;
        }

        // Verificar stock disponible antes de enviar
        var select = document.getElementById('p-medicamento');
        var opt    = select.options[select.selectedIndex];
        if (opt && opt.dataset.stock && parseInt(opt.dataset.stock) === 0) {
            showAlert('presc-alert', 'Este medicamento no tiene stock disponible.', 'error');
            return;
        }

        setLoading('btn-presc', true);
        try {
            await API.crearPrescripcion({
                id_diagnostico:     parseInt(idDiag),
                id_medico:          parseInt(idMedico),
                id_medicamento:     parseInt(idMed),
                dosis:              dosis,
                frecuencia:         frec,
                duracion_dias:      parseInt(dias),
                cantidad_dispensada: parseInt(cant)
            });
            closeModal('modal-prescripcion');
            // Recargar inventario porque el stock cambio
            loadInventario();
        } catch (err) {
            showAlert('presc-alert', err.message, 'error');
        } finally {
            setLoading('btn-presc', false);
        }
    }

    // Inicializar la pagina
    async function init() {
        await loadInventario();
        await loadCitasParaDropdowns();
        // Poner fecha de hoy en el diagnostico
        document.getElementById('d-fecha').valueAsDate = new Date();
    }

    init();
</script>

</body>
</html>
